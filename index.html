dag zo min mogelijk zwemmen. Vertrouw op 8 weken opbouw.",sessions:[{day:"Ma",type:"recovery",desc:"3 km herstelzwemmen",dist:"3 km"},{day:"Di",type:"recovery",desc:"2 km licht",dist:"2 km"},{day:"Wo",type:"recovery",desc:"2 km heel rustig",dist:"2 km"},{day:"Vr",type:"race",desc:"WEDSTRIJD 12 km open water",dist:"12 km"}]},{vol:12,dates:"8-12 jun",tip:"Twee events in een week. Echte rust, september is nog ver.",sessions:[{day:"Ma",type:"recovery",desc:"3 km rustig",dist:"3 km"},{day:"Wo",type:"technique",desc:"3 km drills geen druk",dist:"3 km"},{day:"Vr",type:"endurance",desc:"5 km comfortabel",dist:"5 km"}]},{vol:15,dates:"15-19 jun",tip:"Herstel bijna klaar. Volumes stijgen weer.",sessions:[{day:"Ma",type:"endurance",desc:"4 km steady",dist:"4 km"},{day:"Wo",type:"interval",desc:"8x200m ritme terugvinden",dist:"3.5 km"},{day:"Vr",type:"long",desc:"8 km",dist:"8 km"}]},{vol:22,dates:"22-26 jun",tip:"Zomerfase start. Bouw gestaag op.",sessions:[{day:"Ma",type:"endurance",desc:"6 km steady",dist:"6 km"},{day:"Di",type:"interval",desc:"5x600m plus 2 km",dist:"5 km"},{day:"Wo",type:"openwater",desc:"Open water sessie",dist:"5 km"},{day:"Vr",type:"long",desc:"10 km",dist:"10 km"}]},{vol:25,dates:"29 jun-3 jul",tip:"12 km voelt nu anders dan in mei, je bent sterker.",sessions:[{day:"Ma",type:"endurance",desc:"6 km",dist:"6 km"},{day:"Di",type:"interval",desc:"3x2 km blokken",dist:"8 km"},{day:"Wo",type:"openwater",desc:"Open water",dist:"5 km"},{day:"Vr",type:"long",desc:"12 km",dist:"12 km"}]},{vol:27,dates:"6-10 jul",tip:"Voeding elke 40 min bij sessies langer dan 8 km.",sessions:[{day:"Ma",type:"endurance",desc:"6 km",dist:"6 km"},{day:"Di",type:"interval",desc:"4x2 km op streeftempo",dist:"9 km"},{day:"Wo",type:"openwater",desc:"Open water",dist:"6 km"},{day:"Vr",type:"long",desc:"13 km",dist:"13 km"}]},{vol:24,dates:"13-17 jul",tip:"Herstelweek. Schouders checken, pijn is rust.",sessions:[{day:"Ma",type:"recovery",desc:"5 km herstel",dist:"5 km"},{day:"Wo",type:"technique",desc:"5 km techniek en wetsuit",dist:"5 km"},{day:"Vr",type:"long",desc:"12 km",dist:"12 km"}]},{vol:30,dates:"20-24 jul",tip:"14 km. Noteer hoe je je voelt na km 12.",sessions:[{day:"Ma",type:"endurance",desc:"7 km steady",dist:"7 km"},{day:"Di",type:"interval",desc:"5x2 km",dist:"11 km"},{day:"Wo",type:"openwater",desc:"Open water 7 km",dist:"7 km"},{day:"Vr",type:"long",desc:"14 km",dist:"14 km"}]},{vol:32,dates:"27-31 jul",tip:"17 km, alles simuleren: wetsuit, voeding, navigatie.",sessions:[{day:"Ma",type:"endurance",desc:"7 km",dist:"7 km"},{day:"Di",type:"interval",desc:"4x3 km blokken",dist:"13 km"},{day:"Wo",type:"openwater",desc:"Open water 6 km",dist:"6 km"},{day:"Vr",type:"long",desc:"17 km piektraining",dist:"17 km"}]},{vol:35,dates:"3-7 aug",tip:"Piekweek. Je bent klaar voor 22 km.",sessions:[{day:"Ma",type:"endurance",desc:"7 km steady",dist:"7 km"},{day:"Di",type:"interval",desc:"5x2 km op wedstrijdtempo",dist:"11 km"},{day:"Wo",type:"openwater",desc:"Open water 7 km",dist:"7 km"},{day:"Vr",type:"long",desc:"15 km",dist:"15 km"}]},{vol:30,dates:"10-14 aug",tip:"Kwaliteit boven kwantiteit.",sessions:[{day:"Ma",type:"endurance",desc:"7 km",dist:"7 km"},{day:"Di",type:"interval",desc:"4x2 km",dist:"9 km"},{day:"Wo",type:"openwater",desc:"Open water 6 km",dist:"6 km"},{day:"Vr",type:"long",desc:"13 km steady",dist:"13 km"}]},{vol:25,dates:"17-21 aug",tip:"Laatste intensieve week. Na vrijdag start de taper.",sessions:[{day:"Ma",type:"endurance",desc:"6 km",dist:"6 km"},{day:"Wo",type:"interval",desc:"6x400m scherp plus 3 km",dist:"5.5 km"},{day:"Vr",type:"long",desc:"12 km laatste lange sessie",dist:"12 km"}]},{vol:16,dates:"24-28 aug",tip:"Volume gehalveerd. Intensiteit bewaren in de intervallen.",sessions:[{day:"Ma",type:"endurance",desc:"5 km comfortabel",dist:"5 km"},{day:"Wo",type:"interval",desc:"5x200m scherp plus 2 km",dist:"3 km"},{day:"Vr",type:"endurance",desc:"6 km steady",dist:"6 km"}]},{vol:9,dates:"31 aug-4 sep",tip:"Je bent klaar. const TIPS={voeding:[{t:"Dagelijkse koolhydraten",b:"3-5 g KH per kg lichaamsgewicht op trainingsdagen. Avond voor lange sessie: extra KH (pasta, rijst, quinoa). Ontbijt 90-120 min voor het zwemmen."},{t:"Tijdens zwemmen meer dan 8 km",b:"Elke 40-45 min: energiegel of maltodextrine-drank (60-90 g KH per uur). Test alles voor september, nooit iets nieuws op de wedstrijddag."},{t:"Herstelvoeding",b:"Binnen 30 min na training: 20-30 g eiwit plus koolhydraten. Chocolademelk werkt verrassend goed. Of kwark met banaan en honing."},{t:"Hydratatie",b:"500 ml voor de sessie, 250 ml per zwemuur. Herstel na lange sessies met elektrolyten. Zwemmers onderschatten dorst, je voelt het water niet."},{t:"IJsselmeer voedingsplan",b:"Gel elke 40 min via begeleidingsboot. Maltodextrine-drank als basis. Vaste voeding (banaan, rijstwafel) bij km 8 en km 16. Alles testen in de lange trainingen."},{t:"Gewicht en prestatie",b:"2% gewichtsverlies door dehydratie verlaagt prestatie significant. Weeg voor en na een lange training om je zweetverlies te kennen."}],ademhaling:[{t:"4-7-8 voor het slapen",b:"In 4 tellen, vasthouden 7, uitademen 8. Doe 4-6 cycli voor het slapen. Activeert het parasympatisch systeem en versnelt herstel."},{t:"Box breathing voor events",b:"In 4, hold 4, uit 4, hold 4. Herhaal 10 min voor de start op 29 mei, 5 juni en 4 september. Verlaagt spanning, verhoogt focus."},{t:"Neus-buikademhaling",b:"Oefen dagelijks 5 min: adem via de neus naar de buik. Verhoogt CO2-tolerantie, je kunt langer wachten met inademen tijdens het zwemmen."},{t:"Slagritme en ademhaling",b:"Streef naar inademen elke 3 slagen (bilateraal). Bij hoge intensiteit: elke 2 slagen. Nooit elke slag, vermoeit te snel."},{t:"Mentale ademhaling bij 22 km",b:"Bij moeilijke momenten: 5 slagen inademen, 5 uitademen. Koppel aan je slag. Oefen in de pool zodat het reflexmatig wordt."}],yoga:[{t:"Thread the needle dagelijks",b:"Op handen en knieen. Schuif een arm door onder het lichaam. 60 sec per kant. Opent de thoraxrotatie die je bij elke crawlslag maakt."},{t:"Gomukhasana armen",b:"Een arm omhoog achter het hoofd, de andere omlaag langs de rug. Gebruik een handdoek als verbinding. 45 sec per kant."},{t:"Liggende werveldraaing",b:"Op de rug, een knie naar de tegenoverliggende kant. Perfecte afsluiting na lange zwemtrainingen. 90 sec per kant."},{t:"Yin yoga 1 keer per week",b:"45-60 min op donderdag. YouTube: yin yoga for swimmers. Opent bindweefsel dat bij actieve stretching niet loskomt."},{t:"Yoga nidra na lange trainingen",b:"30-45 min liggende geleide meditatie. Gratis op Insight Timer of YouTube. Wetenschappelijk aangetoond hersteleffect."},{t:"20-min donderdagroutine",b:"1. Kindhouding 60s, 2. Kat-koe 10x, 3. Neerwaartse hond 60s, 4. Thread the needle 2x60s, 5. Gomukhasana 2x45s, 6. Boot pose 3x30s, 7. Liggende draai 2x90s, 8. Savasana 3 min."}],algemeen:[{t:"Sighting in open water",b:"Hef je hoofd elke 10-12 slagen voor orientatie. Zonder sighting zwem je 5-10% extra afstand, op 22 km is dat ruim 1 km."},{t:"Wetsuit training",b:"Oefen met de wetsuit in de pool zodra mogelijk. Wennen kost 2-3 sessies. IJsselmeer in september ca 18 graden, wetsuit sterk aanbevolen."},{t:"Schouderpijn is stopcriterium",b:"Scherpe pijn = stop direct. Pijn langer dan 24u = rust plus arts. Overbelasting kost meer tijd dan preventieve rust."},{t:"Begeleidingsboot regelen",b:"Regel de boot voor 4 september NU. Ze zijn in de zomer snel volgeboekt. De boot levert voeding en biedt veiligheid."},{t:"Mentale blokken bij 22 km",b:"Verdeel in 10 blokken van 2,2 km. Na elk blok: positieve gedachte plus voedingsinname. Schrijf vooraf op waarom je dit doet."},{t:"Slaap is training",b:"8 plus uur in piekweken. Spierherstel en glycogeenopbouw vinden s nachts plaats. Minder slaap = minder trainingseffect plus hoger blessurerisico."}]};

          e("div",{style:{fontSize:14,color:"#1a1a1a",lineHeight:1.55}},ss.desc)
